name: Oslava wave alert

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: oslava-wave-alert
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run wave alert
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MODEL_ALERT_THRESHOLD: ${{ secrets.MODEL_ALERT_THRESHOLD }}
          MODEL_WATCH_THRESHOLD: ${{ secrets.MODEL_WATCH_THRESHOLD }}
          ALERT_COOLDOWN_HOURS: ${{ secrets.ALERT_COOLDOWN_HOURS }}
          ALERT_PROBA_JUMP: ${{ secrets.ALERT_PROBA_JUMP }}
        run: python check_wave.py