name: Oslava alert

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

concurrency:
  group: oslava-alert
  cancel-in-progress: true

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run alert script
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          H_THR_CM: ${{ secrets.H_THR_CM }}
          DH_THR_1H_CM: ${{ secrets.DH_THR_1H_CM }}
          ROLLING_DH_3H_CM: ${{ secrets.ROLLING_DH_3H_CM }}
          Q_THR_M3S: ${{ secrets.Q_THR_M3S }}
          ALWAYS_EMAIL: ${{ secrets.ALWAYS_EMAIL }}
        run: python alert_oslava.py