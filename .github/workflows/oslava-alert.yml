name: Oslava alert

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run alert script
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}

          H_MIN_WATCH_CM: ${{ secrets.H_MIN_WATCH_CM }}
          H_MIN_ALERT_CM: ${{ secrets.H_MIN_ALERT_CM }}
          DH_WATCH_1H_CM: ${{ secrets.DH_WATCH_1H_CM }}
          DH_ALERT_1H_CM: ${{ secrets.DH_ALERT_1H_CM }}
          ROLLING_WATCH_3H_CM: ${{ secrets.ROLLING_WATCH_3H_CM }}
          ROLLING_ALERT_3H_CM: ${{ secrets.ROLLING_ALERT_3H_CM }}
          Q_WATCH_M3S: ${{ secrets.Q_WATCH_M3S }}
          Q_ALERT_M3S: ${{ secrets.Q_ALERT_M3S }}
          ETA_MIN_H: ${{ secrets.ETA_MIN_H }}
          ETA_MAX_H: ${{ secrets.ETA_MAX_H }}

          ALWAYS_EMAIL: ${{ secrets.ALWAYS_EMAIL }}

          MODEL_PATH: models/oslava_model_tplus2h.json

        run: python alert_oslava.py